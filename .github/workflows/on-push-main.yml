name: Push Main - Publish to GH Pages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          set-safe-directory: true
          submodules: recursive

      - name: setup node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache-dependency-path: ops/fixtures/wanix/go.sum

      - name: setup and build
        run: |
          yarn
          yarn task run app:build
          yarn task run ci:pages:copy-404
          yarn task run ci:pages:copy-cname

      - name: Push
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: public # The branch name where you want to push the assets
          FOLDER: ./cafe/dist # The directory where your assets are generated
          MESSAGE: 'Build: ({sha}) {msg}' # The commit message
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHub will automatically add this - you don't need to bother getting a token
