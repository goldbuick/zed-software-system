name: PR Check - Lint & Test

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  lint-and-test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        script: ['app:lint', 'app:test', 'native:lint']
    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          set-safe-directory: true

      - name: setup node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: install dependencies
        run: yarn install --frozen-lockfile

      - name: install clang-format
        if: matrix.script == 'native:lint'
        run: sudo apt-get update && sudo apt-get install -y clang-format-18

      - name: run ${{ matrix.script }}
        env:
          CLANG_FORMAT: clang-format-18
        run: yarn ${{ matrix.script }}

  docs-and-lang:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          set-safe-directory: true

      - name: setup node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: install dependencies
        run: yarn install --frozen-lockfile

      - name: check doc links
        run: yarn docs:check-links

      - name: lang regression
        run: yarn lang-regression:test

      - name: content book build and validate
        run: |
          yarn content:book:build content/templates/minimal
          yarn content:book:validate content/dist/minimal.book.json
          yarn content:book:test

  e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          set-safe-directory: true

      - name: setup node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: install dependencies
        run: yarn install --frozen-lockfile

      - name: install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: run e2e tests
        run: PLAYWRIGHT_INCLUDE_GADGET_E2E=1 PLAYWRIGHT_INCLUDE_JOIN_E2E=1 yarn e2e:test
