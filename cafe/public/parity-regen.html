<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>parity regen</title>
  </head>
  <body>
    <pre id="out">rendering…</pre>
    <script type="module">
      import { renderwasmparitypatch } from '/zss/feature/synth/backend/wasm/wasmparityrender.ts'
      import { renderdaisyparitypatch } from '/zss/feature/synth/backend/daisy/daisyparityrender.ts'
      import {
        renderdaisyparitydrumpatch,
        renderdaisyparityfxpatch,
        renderdaisyparitymasterpatch,
      } from '/zss/feature/synth/backend/daisy/daisyparityrender.ts'
      import {
        rendertoneparitypatch,
        rendertoneparitydrumpatch,
        rendertoneparityfxpatch,
        rendertoneparitymasterpatch,
      } from '/zss/feature/synth/backend/wasm/toneparityrender.ts'
      import {
        DRUM_PARITY_PATCHES,
        FX_PARITY_PATCHES,
        MASTER_DYNAMICS_PARITY_PATCHES,
        WASM_PARITY_PATCHES,
      } from '/zss/feature/synth/backend/wasm/paritypatches.ts'

      const outel = document.getElementById('out')
      try {
        const params = new URLSearchParams(window.location.search)
        const patchid = params.get('patch')
        const kind = params.get('kind') || 'voice'
        const backend = params.get('backend') || 'wasm'
        const out = {}

        async function renderpatch(id, patchkind) {
          if (backend === 'tone') {
            if (patchkind === 'drum') {
              const patch = DRUM_PARITY_PATCHES.find((item) => item.id === id)
              if (!patch) throw new Error(`unknown drum patch ${id}`)
              return rendertoneparitydrumpatch(patch)
            }
            if (patchkind === 'fx') {
              const patch = FX_PARITY_PATCHES.find((item) => item.id === id)
              if (!patch) throw new Error(`unknown fx patch ${id}`)
              return rendertoneparityfxpatch(patch)
            }
            if (patchkind === 'master') {
              const patch = MASTER_DYNAMICS_PARITY_PATCHES.find((item) => item.id === id)
              if (!patch) throw new Error(`unknown master patch ${id}`)
              return rendertoneparitymasterpatch(patch)
            }
            const patch = WASM_PARITY_PATCHES.find((item) => item.id === id)
            if (!patch) throw new Error(`unknown voice patch ${id}`)
            return rendertoneparitypatch(patch)
          }
          if (backend === 'daisy') {
            if (patchkind === 'drum') {
              const patch = DRUM_PARITY_PATCHES.find((item) => item.id === id)
              if (!patch) throw new Error(`unknown drum patch ${id}`)
              return renderdaisyparitydrumpatch(patch)
            }
            if (patchkind === 'fx') {
              const patch = FX_PARITY_PATCHES.find((item) => item.id === id)
              if (!patch) throw new Error(`unknown fx patch ${id}`)
              return renderdaisyparityfxpatch(patch)
            }
            if (patchkind === 'master') {
              const patch = MASTER_DYNAMICS_PARITY_PATCHES.find((item) => item.id === id)
              if (!patch) throw new Error(`unknown master patch ${id}`)
              return renderdaisyparitymasterpatch(patch)
            }
            const patch = WASM_PARITY_PATCHES.find((item) => item.id === id)
            if (!patch) throw new Error(`unknown voice patch ${id}`)
            return renderdaisyparitypatch(patch)
          }
          if (patchkind === 'drum') {
            throw new Error('wasm drum regen not implemented')
          }
          if (patchkind === 'fx') {
            throw new Error('wasm fx regen not implemented')
          }
          const patch = WASM_PARITY_PATCHES.find((item) => item.id === id)
          if (!patch) throw new Error(`unknown patch ${id}`)
          return renderwasmparitypatch(patch)
        }

        if (patchid) {
          out[patchid] = await renderpatch(patchid, kind)
        } else {
          for (const patch of WASM_PARITY_PATCHES) {
            out[patch.id] = await renderpatch(patch.id, 'voice')
          }
        }
        outel.textContent = JSON.stringify(out)
      } catch (err) {
        outel.textContent = `error: ${err?.message ?? err}`
        throw err
      }
    </script>
  </body>
</html>
