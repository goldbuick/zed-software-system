<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>wanix 0.4 basic-vm smoke</title>
    <script type="module" src="/wanix/wanix.min.js"></script>
  </head>
  <body style="height: 100vh; margin: 0">
    <!-- Upstream tractordev/wanix examples/basic-vm.html (0.4 recipe) -->
    <wanix-system wasm="/wanix/wanix.wasm">
      <wanix-bind
        dst="."
        src="https://cdn.jsdelivr.net/npm/wanix-extras@0.4.0-rc1/dist/wanix-linux.tgz"
        type="archive"
      ></wanix-bind>
      <wanix-bind dst="vm" src="#vm"></wanix-bind>
      <wanix-bind
        dst="#vm/v86"
        src="https://cdn.jsdelivr.net/npm/wanix-extras@0.4.0-rc1/dist/v86.tgz"
        type="archive"
      ></wanix-bind>
      <wanix-vm id="linux-vm" export="ttyS0" term start></wanix-vm>
    </wanix-system>
    <pre id="log" style="position: fixed; bottom: 0; left: 0; background: #111; color: #0f0; padding: 8px; max-height: 30vh; overflow: auto; font: 12px monospace"></pre>
    <script type="module">
      const logel = document.getElementById('log')
      function log(line) {
        logel.textContent += line + '\n'
        console.log('[smoke-basic-vm]', line)
      }
      window.addEventListener('error', (e) => log('window.error: ' + e.message))
      window.addEventListener('unhandledrejection', (e) =>
        log('unhandledrejection: ' + e.reason),
      )
      const sys = document.querySelector('wanix-system')
      sys.addEventListener('ready', async () => {
        log('wanix-system ready')
        try {
          await sys.root.waitFor('#vm/v86/v86-vm.wasm', 600000)
          log('v86 driver present')
          window.__WANIX_SMOKE_OK__ = true
        } catch (err) {
          log('waitFor failed: ' + err)
          window.__WANIX_SMOKE_ERROR__ = String(err)
        }
      })
      sys.addEventListener('error', (e) => {
        log('wanix-system error: ' + (e.detail?.error ?? e))
      })
    </script>
  </body>
</html>
