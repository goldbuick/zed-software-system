<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>wanix basic-terminal (upstream gojs + term)</title>
    <script type="module" src="/wanix/wanix.min.js"></script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      wanix-system {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
      }
      wanix-term {
        flex: 1;
        min-height: 0;
      }
      #log {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        max-height: 22vh;
        margin: 0;
        padding: 8px;
        background: rgba(0, 0, 0, 0.75);
        color: #0f0;
        font: 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        overflow: auto;
        pointer-events: none;
      }
    </style>
  </head>
  <body style="height: 100vh; margin: 0">
    <!-- Upstream tractordev/wanix examples/basic-terminal.html (0.4 recipe) -->
    <wanix-system wasm="/wanix/wanix.debug.wasm" debug>
      <wanix-bind
        type="fetch"
        dst="gojs.wasm"
        src="/wanix/gojscheck.wasm"
      ></wanix-bind>
      <wanix-task
        id="demotask"
        type="gojs"
        cmd="gojs.wasm arg1 arg2"
        term
        start
      ></wanix-task>
      <wanix-term path="#task/demotask/term"></wanix-term>
    </wanix-system>
    <pre id="log"></pre>
    <script type="module">
      const logel = document.getElementById('log')
      function log(line) {
        if (!logel) {
          return
        }
        logel.textContent += line + '\n'
        console.log('[basic-terminal]', line)
      }

      window.addEventListener('error', (e) => log('window.error: ' + e.message))
      window.addEventListener('unhandledrejection', (e) =>
        log('unhandledrejection: ' + e.reason),
      )

      const sys = document.querySelector('wanix-system')
      sys.addEventListener('ready', () => log('wanix-system ready'))
      sys.addEventListener('error', (e) => {
        log('wanix-system error: ' + (e.detail?.error ?? e))
      })
    </script>
  </body>
</html>
