<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>wanix host</title>
</head>
<body>
  <wanix-system wasm="/wanix/wanix.wasm">
    <wanix-bind dst="." src="#ramfs" data-wanix-boot="ramfs"></wanix-bind>
  </wanix-system>
  <script type="module" src="/wanix/wanix.min.js"></script>
  <script type="module">
    const origin = location.origin
    const DATA_WAIT_MS = 30_000
    const BIND_MOUNT_TIMEOUT_MS = 120_000
    const VM_PREP_WAIT_MS = 600_000
    const VM_V86_DRIVER_PATH = '#vm/v86/v86-vm.wasm'
    const sys = document.querySelector('wanix-system')
    let root = null
    let active = false
    let bindseq = 0

    const registry = {
      binds: [],
      tasks: new Map(),
      vms: new Map(),
      attached: null,
      attachedKind: null,
      vmbindsready: false,
    }

    function post(type, data = {}) {
      parent.postMessage({ type, ...data }, origin)
    }

    function replydone(type, msg, extra = {}) {
      post(type, { id: msg.id, ...extra })
    }

    function replyerror(type, msg, error) {
      post(type, { id: msg.id, error })
    }

    function wanixtrace(checkpoint, detail) {
      const parentwin = typeof parent !== 'undefined' ? parent : null
      const on =
        (typeof window !== 'undefined' && window.__ZSS_WANIX_TRACE__) ||
        (parentwin && parentwin.__ZSS_WANIX_TRACE__)
      if (!on) {
        return
      }
      if (detail !== undefined) {
        console.debug(`[wanix] ${checkpoint}`, detail)
      } else {
        console.debug(`[wanix] ${checkpoint}`)
      }
    }

    let termwritechain = Promise.resolve()

    function queuetermwrite(writefn) {
      const job = termwritechain.then(writefn)
      termwritechain = job.catch(() => {})
      return job
    }

    function encodestreambytes(msg) {
      const raw = msg.bytes
      if (raw instanceof ArrayBuffer) {
        if (raw.byteLength === 0) {
          return null
        }
        return new Uint8Array(raw)
      }
      if (ArrayBuffer.isView(raw)) {
        if (raw.byteLength === 0) {
          return null
        }
        return new Uint8Array(raw.buffer, raw.byteOffset, raw.byteLength)
      }
      return null
    }

    function handlettermwrite(msg) {
      if (!root || !registry.attached || !registry.attachedKind) {
        replyerror('wanix:term-write:done', msg, 'no attached target')
        return
      }
      void (async () => {
        try {
          const writer = await getattachedtermwriter()
          if (msg.stream === true) {
            const rawbytes = encodestreambytes(msg)
            if (!rawbytes) {
              wanixtrace('term-write:stream:reject', {
                id: msg.id,
                reason: 'missing or empty bytes',
              })
              replyerror('wanix:term-write:done', msg, 'missing stream bytes')
              return
            }
            wanixtrace('term-write:stream:start', {
              id: msg.id,
              len: rawbytes.byteLength,
            })
            void queuetermwrite(() => writer.write(rawbytes))
              .then(() => {
                wanixtrace('term-write:stream:done', { id: msg.id })
                replydone('wanix:term-write:done', msg)
              })
              .catch((err) => {
                const message = err instanceof Error ? err.message : String(err)
                wanixtrace('term-write:stream:fail', {
                  id: msg.id,
                  error: message,
                })
                replyerror('wanix:term-write:done', msg, message)
              })
            return
          }
          const line = typeof msg.data === 'string' ? msg.data : ''
          const raw =
            msg.raw === true || registry.attachedKind === 'vm'
          const payload = raw
            ? new TextEncoder().encode(`${line}\r\n`)
            : new TextEncoder().encode(`${line}\n`)
          wanixtrace('term-write:line:start', {
            id: msg.id,
            len: payload.byteLength,
            raw,
          })
          void queuetermwrite(() => writer.write(payload))
            .then(() => {
              wanixtrace('term-write:line:done', { id: msg.id })
              replydone('wanix:term-write:done', msg)
            })
            .catch((err) => {
              const message = err instanceof Error ? err.message : String(err)
              wanixtrace('term-write:line:fail', { id: msg.id, error: message })
              replyerror('wanix:term-write:done', msg, message)
            })
        } catch (err) {
          const message = err instanceof Error ? err.message : String(err)
          replyerror('wanix:term-write:done', msg, message)
        }
      })()
    }

    function newbindid() {
      bindseq += 1
      return `bind-${bindseq}`
    }

    function bindmeta(entry) {
      return {
        id: entry.id,
        kind: entry.kind,
        dst: entry.dst,
        label: entry.label,
        removable: entry.removable,
      }
    }

    function listbindmeta() {
      return registry.binds.map(bindmeta)
    }

    function listremovablebindmeta() {
      return registry.binds.filter((entry) => entry.removable).map(bindmeta)
    }

    function taskmeta(entry) {
      return {
        id: entry.id,
        cmd: entry.cmd,
        rid: entry.rid,
        running: entry.rid != null,
        attached:
          registry.attachedKind === 'task' && registry.attached === entry.id,
      }
    }

    function vmmeta(entry) {
      return {
        id: entry.id,
        mem: entry.mem,
        vrid: entry.vrid,
        running: entry.innertaskrid != null,
        attached:
          registry.attachedKind === 'vm' && registry.attached === entry.id,
      }
    }

    function listtaskmeta() {
      return [...registry.tasks.values()].map(taskmeta)
    }

    function listvmmeta() {
      return [...registry.vms.values()].map(vmmeta)
    }

    function readregistry() {
      const tasks = listtaskmeta()
      const vms = listvmmeta()
      const attached = registry.attached
      const attachedkind = registry.attachedKind
      let termpath = undefined
      if (attachedkind === 'task' && attached) {
        termpath = registry.tasks.get(attached)?.termpath
      } else if (attachedkind === 'vm' && attached) {
        termpath = registry.vms.get(attached)?.termpath
      }
      return {
        binds: listbindmeta(),
        tasks,
        vms,
        attachedId: attached ?? undefined,
        attachedKind: attachedkind ?? undefined,
        attachedTaskId:
          attachedkind === 'task' ? attached ?? undefined : undefined,
        taskactive: tasks.some((task) => task.running),
        vmactive: vms.some((vm) => vm.running),
        vmbindsready: registry.vmbindsready,
        tid:
          attachedkind === 'task'
            ? registry.tasks.get(attached)?.rid ?? undefined
            : undefined,
        termpath,
      }
    }

    function sanitizetaskid(label) {
      const base = String(label || 'task')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
      return base || 'task'
    }

    function uniquetaskid(label) {
      const base = sanitizetaskid(label)
      let candidate = base
      let seq = 2
      while (registry.tasks.has(candidate)) {
        candidate = `${base}-${seq}`
        seq += 1
      }
      return candidate
    }

    function uniquevmid(label) {
      const base = sanitizetaskid(label)
      let candidate = base
      let seq = 2
      while (registry.vms.has(candidate)) {
        candidate = `${base}-${seq}`
        seq += 1
      }
      return candidate
    }

    function registerbootbind(el) {
      const id = newbindid()
      registry.binds.push({
        el,
        id,
        kind: 'boot',
        dst: '.',
        label: '#ramfs',
        removable: false,
      })
      el.dataset.wanixBindId = id
    }

    async function mountbindelement(bindel, label, opts = {}) {
      const timeoutms = opts.timeoutms ?? BIND_MOUNT_TIMEOUT_MS
      const prefix = opts.prefix ? `${opts.prefix}: ` : ''
      let timer
      try {
        await Promise.race([
          sys._setupNamespace('1', '', [bindel]),
          new Promise((_, reject) => {
            timer = setTimeout(
              () => reject(new Error(`bind mount timeout (${timeoutms}ms)`)),
              timeoutms,
            )
          }),
        ])
      } catch (err) {
        const message = err instanceof Error ? err.message : String(err)
        throw new Error(`${prefix}failed to mount ${label}: ${message}`)
      } finally {
        clearTimeout(timer)
      }
    }

    async function addbind(attrs) {
      const bindel = document.createElement('wanix-bind')
      for (const [key, value] of Object.entries(attrs)) {
        if (value != null && key !== 'label') {
          bindel.setAttribute(key, String(value))
        }
      }
      const id = newbindid()
      const entry = {
        el: bindel,
        id,
        kind: attrs.type || 'ns',
        dst: attrs.dst || '.',
        label: attrs.label || attrs.dst || id,
        removable: attrs.removable !== false,
      }
      bindel.dataset.wanixBindId = id
      sys.appendChild(bindel)
      registry.binds.push(entry)
      try {
        await mountbindelement(bindel, entry.label, {
          prefix: typeof attrs.mountprefix === 'string' ? attrs.mountprefix : '',
          timeoutms:
            typeof attrs.mounttimeoutms === 'number'
              ? attrs.mounttimeoutms
              : BIND_MOUNT_TIMEOUT_MS,
        })
      } catch (err) {
        bindel.remove()
        const idx = registry.binds.indexOf(entry)
        if (idx !== -1) {
          registry.binds.splice(idx, 1)
        }
        throw err
      }
      return id
    }

    function removebind(bindid) {
      const idx = registry.binds.findIndex((entry) => entry.id === bindid)
      if (idx === -1) {
        throw new Error(`unknown bind: ${bindid}`)
      }
      const entry = registry.binds[idx]
      if (!entry.removable) {
        throw new Error(`bind not removable: ${bindid}`)
      }
      entry.el.remove()
      registry.binds.splice(idx, 1)
      return entry.id
    }

    function removeallbinds() {
      const removed = []
      for (const entry of [...registry.binds]) {
        if (!entry.removable) {
          continue
        }
        entry.el.remove()
        removed.push(entry.id)
        const idx = registry.binds.indexOf(entry)
        if (idx !== -1) {
          registry.binds.splice(idx, 1)
        }
      }
      return removed
    }

    function disconnectterm(entry) {
      if (!entry) {
        return
      }
      entry.termreading = null
      if (entry.termwriter) {
        try {
          entry.termwriter.releaseLock()
        } catch {
          // writer may already be closed
        }
        entry.termwriter = null
      }
      entry.termpath = null
    }

    function notifyattached() {
      post('wanix:attached-changed', {
        attachedId: registry.attached,
        attachedKind: registry.attachedKind,
        raw: registry.attachedKind === 'vm',
      })
    }

    function clearattachedif(kind, id) {
      if (registry.attachedKind === kind && registry.attached === id) {
        registry.attached = null
        registry.attachedKind = null
        notifyattached()
      }
    }

    async function removetask(taskid) {
      const entry = registry.tasks.get(taskid)
      if (!entry) {
        return
      }
      disconnectterm(entry)
      entry.el.remove()
      registry.tasks.delete(taskid)
      clearattachedif('task', taskid)
    }

    async function removevm(vmid) {
      const entry = registry.vms.get(vmid)
      if (!entry) {
        return
      }
      disconnectterm(entry)
      entry.el.remove()
      registry.vms.delete(vmid)
      clearattachedif('vm', vmid)
    }

    function createtask(cmd, taskid) {
      const task = document.createElement('wanix-task')
      task.setAttribute('id', taskid)
      task.setAttribute('type', 'wasi')
      task.setAttribute('term', '')
      task.setAttribute('cmd', cmd)
      sys.appendChild(task)
      return task
    }

    function createvm(vmid, mem) {
      const vm = document.createElement('wanix-vm')
      vm.setAttribute('id', vmid)
      vm.setAttribute('export', 'ttyS0')
      vm.setAttribute('term', '')
      vm.setAttribute('mem', mem)
      sys.appendChild(vm)
      return vm
    }

    function streamtermout(kind, id, stream) {
      const reader = stream.getReader()
      const decoder = new TextDecoder()

      const reading = (async () => {
        try {
          while (true) {
            const { value, done } = await reader.read()
            if (done) {
              break
            }
            if (
              value &&
              value.byteLength > 0 &&
              registry.attached === id &&
              registry.attachedKind === kind
            ) {
              post('wanix:term-out', {
                attachKind: kind,
                attachId: id,
                taskId: kind === 'task' ? id : undefined,
                chunk: decoder.decode(value, { stream: true }),
              })
            }
          }
        } finally {
          reader.releaseLock()
        }
      })()

      return { reading }
    }

    async function connecttaskterm(entry) {
      const termpath = `#task/${entry.id}/term`
      const datapath = `${termpath}/data`
      await root.waitFor(datapath, DATA_WAIT_MS)
      const readable = await root.openReadable(datapath)
      const { reading } = streamtermout('task', entry.id, readable)
      entry.termreading = reading
      const writable = await root.openWritable(datapath)
      entry.termwriter = writable.getWriter()
      entry.termpath = termpath
      return { reading }
    }

    async function connectvmterm(entry) {
      const termpath = `#vm/${entry.id}/term`
      const datapath = `${termpath}/data`
      await root.waitFor(datapath, VM_PREP_WAIT_MS)
      const readable = await root.openReadable(datapath)
      const { reading } = streamtermout('vm', entry.id, readable)
      entry.termreading = reading
      const writable = await root.openWritable(datapath)
      entry.termwriter = writable.getWriter()
      entry.termpath = termpath
      return { reading }
    }

    function getattachedentry() {
      if (!registry.attached || !registry.attachedKind) {
        return null
      }
      if (registry.attachedKind === 'task') {
        return registry.tasks.get(registry.attached) ?? null
      }
      return registry.vms.get(registry.attached) ?? null
    }

    async function getattachedtermwriter() {
      const entry = getattachedentry()
      if (!entry?.termwriter) {
        throw new Error('no attached term writer')
      }
      return entry.termwriter
    }

    function polltaskexit(taskid) {
      return (async () => {
        const entry = registry.tasks.get(taskid)
        if (!entry?.rid) {
          return 1
        }
        const taskpath = `#task/${entry.rid}`
        const reading = entry.termreading
        while (true) {
          try {
            const exit = (await root.readText(`${taskpath}/exit`)).trim()
            if (exit !== '') {
              const code = Number(exit) || 0
              if (
                registry.attachedKind === 'task' &&
                registry.attached === taskid &&
                reading
              ) {
                await Promise.race([
                  reading,
                  new Promise((resolve) => setTimeout(resolve, 250)),
                ])
              }
              post('wanix:task-exit', { taskId: taskid, code })
              await removetask(taskid)
              return code
            }
          } catch {
            // task still running
          }
          if (!registry.tasks.has(taskid)) {
            return 1
          }
          await new Promise((resolve) => setTimeout(resolve, 50))
        }
      })()
    }

    function pollvmexit(vmid) {
      return (async () => {
        const entry = registry.vms.get(vmid)
        if (!entry?.innertaskrid) {
          return 1
        }
        const taskpath = `#task/${entry.innertaskrid}`
        const reading = entry.termreading
        while (true) {
          try {
            const exit = (await root.readText(`${taskpath}/exit`)).trim()
            if (exit !== '') {
              const code = Number(exit) || 0
              if (
                registry.attachedKind === 'vm' &&
                registry.attached === vmid &&
                reading
              ) {
                await Promise.race([
                  reading,
                  new Promise((resolve) => setTimeout(resolve, 250)),
                ])
              }
              post('wanix:vm-exit', { vmId: vmid, code })
              await removevm(vmid)
              return code
            }
          } catch {
            // vm still running
          }
          if (!registry.vms.has(vmid)) {
            return 1
          }
          await new Promise((resolve) => setTimeout(resolve, 50))
        }
      })()
    }

    async function attachtarget(kind, id) {
      if (kind === 'task') {
        const entry = registry.tasks.get(id)
        if (!entry?.rid) {
          throw new Error(`unknown task: ${id}`)
        }
      } else {
        const entry = registry.vms.get(id)
        if (!entry?.innertaskrid) {
          throw new Error(`unknown vm: ${id}`)
        }
      }
      registry.attached = id
      registry.attachedKind = kind
      notifyattached()
    }

    async function spawntask(cmd, taskid, opts = {}) {
      const taskcmd = (cmd || '').trim()
      if (!taskcmd) {
        throw new Error('empty command')
      }
      const id = taskid || uniquetaskid(taskcmd)
      if (registry.tasks.has(id)) {
        throw new Error(`task already exists: ${id}`)
      }
      const el = createtask(taskcmd, id)
      const entry = {
        el,
        id,
        cmd: taskcmd,
        rid: null,
        termpath: null,
        termwriter: null,
        termreading: null,
        exitpoll: null,
      }
      registry.tasks.set(id, entry)
      await el.allocate()
      entry.rid = el.rid
      await connecttaskterm(entry)
      await el.start()
      entry.exitpoll = polltaskexit(id)
      if (opts.attach !== false) {
        await attachtarget('task', id)
      }
      if (opts.wait) {
        const code = await entry.exitpoll
        return { taskId: id, code }
      }
      return id
    }

    async function spawnvm(vmid, opts = {}) {
      const mem = typeof opts.mem === 'string' ? opts.mem : '512M'
      const id = vmid || uniquevmid('linux-vm')
      if (registry.vms.has(id)) {
        throw new Error(`vm already exists: ${id}`)
      }
      const el = createvm(id, mem)
      const entry = {
        el,
        id,
        mem,
        vrid: null,
        innertaskrid: null,
        termpath: null,
        termwriter: null,
        termreading: null,
        exitpoll: null,
      }
      registry.vms.set(id, entry)
      try {
        await el.allocate()
        entry.vrid = el.rid
        entry.innertaskrid = el.task.rid
        await connectvmterm(entry)
        await el.start()
      } catch (err) {
        await removevm(id)
        const message = err instanceof Error ? err.message : String(err)
        throw new Error(`wanix vm run: ${message}`)
      }
      entry.exitpoll = pollvmexit(id)
      if (opts.attach !== false) {
        await attachtarget('vm', id)
      }
      if (opts.wait) {
        const code = await entry.exitpoll
        return { vmId: id, code }
      }
      return id
    }

    async function stoptask(taskid) {
      const entry = registry.tasks.get(taskid)
      if (!entry) {
        return
      }
      if (entry.rid) {
        try {
          await root.writeFile(`#task/${entry.rid}/ctl`, 'stop')
        } catch {
          // task may already be gone
        }
      }
      if (entry.exitpoll) {
        try {
          await Promise.race([
            entry.exitpoll,
            new Promise((resolve) => setTimeout(resolve, 500)),
          ])
        } catch {
          // exit poll may reject if task already removed
        }
      }
      await removetask(taskid)
    }

    async function stopvm(vmid) {
      const entry = registry.vms.get(vmid)
      if (!entry) {
        return
      }
      if (entry.innertaskrid) {
        try {
          await root.writeFile(`#task/${entry.innertaskrid}/ctl`, 'stop')
        } catch {
          // inner task may already be gone
        }
      }
      if (entry.exitpoll) {
        try {
          await Promise.race([
            entry.exitpoll,
            new Promise((resolve) => setTimeout(resolve, 500)),
          ])
        } catch {
          // exit poll may reject if vm already removed
        }
      }
      await removevm(vmid)
    }

    async function halttask(taskid) {
      if (taskid) {
        await stoptask(taskid)
        return
      }
      for (const id of [...registry.tasks.keys()]) {
        await stoptask(id)
      }
    }

    async function haltvm(vmid) {
      if (vmid) {
        await stopvm(vmid)
        return
      }
      for (const id of [...registry.vms.keys()]) {
        await stopvm(id)
      }
    }

    async function ensurevmbinds(urls) {
      if (registry.vmbindsready) {
        return
      }
      const linux = urls?.linux
      const v86 = urls?.v86
      if (!linux || !v86) {
        throw new Error('missing vm asset urls')
      }
      post('wanix:log', { line: 'wanix vm prep: mounting linux rootfs...' })
      await addbind({
        type: 'archive',
        dst: '.',
        src: linux,
        label: 'wanix-linux',
        removable: false,
        mountprefix: 'wanix vm prep',
        mounttimeoutms: VM_PREP_WAIT_MS,
      })
      post('wanix:log', { line: 'wanix vm prep: mounting v86 driver...' })
      await addbind({
        type: 'archive',
        dst: '#vm/v86',
        src: v86,
        label: 'v86',
        removable: false,
        mountprefix: 'wanix vm prep',
        mounttimeoutms: VM_PREP_WAIT_MS,
      })
      try {
        await root.waitFor(VM_V86_DRIVER_PATH, VM_PREP_WAIT_MS)
      } catch {
        throw new Error(
          'wanix vm prep: v86 driver not found after mount — check CDN/network',
        )
      }
      registry.vmbindsready = true
    }

    async function putfile(name, bytes) {
      await root.writeFile(name, bytes)
    }

    async function mountarchive(bytes, label, mountdst) {
      const url = URL.createObjectURL(new Blob([bytes], { type: 'application/gzip' }))
      try {
        const bindid = await addbind({
          type: 'archive',
          dst: mountdst || '.',
          src: url,
          label: label || 'archive.tgz',
        })
        return bindid
      } finally {
        URL.revokeObjectURL(url)
      }
    }

    async function listdir(path) {
      const entries = await root.readDir(path)
      return entries.map((name) => String(name))
    }

    async function boot() {
      const bootel = sys.querySelector('wanix-bind[data-wanix-boot]')
      if (bootel) {
        registerbootbind(bootel)
      }
      await new Promise((resolve) => {
        sys.addEventListener('ready', resolve, { once: true })
      })
      root = sys.root
      active = true
      post('wanix:ready')
      post('wanix:started')
    }

    window.addEventListener('message', async (ev) => {
      if (ev.origin !== origin) {
        return
      }
      const msg = ev.data
      if (!msg || typeof msg.type !== 'string') {
        return
      }
      try {
        switch (msg.type) {
          case 'wanix:status':
            replydone('wanix:status', msg, {
              active,
              ready: active && root != null,
              ...readregistry(),
            })
            break
          case 'wanix:list-tasks':
            replydone('wanix:list-tasks', msg, {
              tasks: listtaskmeta(),
              attachedId: registry.attached ?? undefined,
              attachedKind: registry.attachedKind ?? undefined,
            })
            break
          case 'wanix:list-vms':
            replydone('wanix:list-vms', msg, {
              vms: listvmmeta(),
              attachedId: registry.attached ?? undefined,
              attachedKind: registry.attachedKind ?? undefined,
            })
            break
          case 'wanix:list-binds':
            replydone('wanix:list-binds', msg, {
              binds: listremovablebindmeta(),
            })
            break
          case 'wanix:vm-prep': {
            if (!root) {
              replyerror('wanix:vm-prep:done', msg, 'not ready')
              break
            }
            await ensurevmbinds(msg.urls)
            replydone('wanix:vm-prep:done', msg, { ready: true })
            break
          }
          case 'wanix:put': {
            if (!root) {
              replyerror('wanix:put:done', msg, 'not ready')
              break
            }
            const raw = msg.bytes
            const bytes =
              raw instanceof ArrayBuffer
                ? new Uint8Array(raw)
                : new Uint8Array(raw)
            await putfile(msg.name, bytes)
            replydone('wanix:put:done', msg)
            break
          }
          case 'wanix:mount-archive': {
            if (!root) {
              replyerror('wanix:mount-archive:done', msg, 'not ready')
              break
            }
            const raw = msg.bytes
            const bytes =
              raw instanceof ArrayBuffer
                ? new Uint8Array(raw)
                : new Uint8Array(raw)
            const label = typeof msg.name === 'string' ? msg.name : 'archive.tgz'
            const mountdst =
              typeof msg.mountDst === 'string' ? msg.mountDst : '.'
            const bindid = await mountarchive(bytes, label, mountdst)
            replydone('wanix:mount-archive:done', msg, { bindId: bindid })
            break
          }
          case 'wanix:unmount': {
            if (!root) {
              replyerror('wanix:unmount:done', msg, 'not ready')
              break
            }
            const bindid = typeof msg.bindId === 'string' ? msg.bindId : ''
            if (!bindid) {
              replyerror('wanix:unmount:done', msg, 'missing bindId')
              break
            }
            removebind(bindid)
            replydone('wanix:unmount:done', msg, { bindId: bindid })
            break
          }
          case 'wanix:unmount-all': {
            if (!root) {
              replyerror('wanix:unmount-all:done', msg, 'not ready')
              break
            }
            const removed = removeallbinds()
            replydone('wanix:unmount-all:done', msg, { removed })
            break
          }
          case 'wanix:ls': {
            if (!root) {
              replyerror('wanix:ls:done', msg, 'not ready')
              break
            }
            const entries = await listdir(msg.path || '.')
            replydone('wanix:ls:done', msg, { entries })
            break
          }
          case 'wanix:attach': {
            if (!root) {
              replyerror('wanix:attach:done', msg, 'not ready')
              break
            }
            const kind = msg.attachKind === 'vm' ? 'vm' : 'task'
            const id =
              typeof msg.attachId === 'string'
                ? msg.attachId
                : typeof msg.taskId === 'string'
                  ? msg.taskId
                  : typeof msg.vmId === 'string'
                    ? msg.vmId
                    : ''
            if (!id) {
              replyerror('wanix:attach:done', msg, 'missing attach id')
              break
            }
            await attachtarget(kind, id)
            replydone('wanix:attach:done', msg, {
              attachKind: kind,
              attachId: id,
            })
            break
          }
          case 'wanix:halt': {
            if (!root) {
              replyerror('wanix:halt:done', msg, 'not ready')
              break
            }
            const taskid =
              typeof msg.taskId === 'string' ? msg.taskId : undefined
            await halttask(taskid)
            replydone('wanix:halt:done', msg)
            break
          }
          case 'wanix:vm-halt': {
            if (!root) {
              replyerror('wanix:vm-halt:done', msg, 'not ready')
              break
            }
            const vmid = typeof msg.vmId === 'string' ? msg.vmId : undefined
            await haltvm(vmid)
            replydone('wanix:vm-halt:done', msg)
            break
          }
          case 'wanix:run': {
            if (!root) {
              post('wanix:run:done', { id: msg.id, code: 1, error: 'not ready' })
              break
            }
            const wait = msg.wait === true
            const taskid =
              typeof msg.taskId === 'string' ? msg.taskId : undefined
            const attach = msg.attach !== false
            if (wait) {
              const result = await spawntask(msg.cmd, taskid, {
                wait: true,
                attach,
              })
              post('wanix:run:done', {
                id: msg.id,
                taskId: result.taskId,
                code: result.code,
              })
            } else {
              const spawned = await spawntask(msg.cmd, taskid, {
                wait: false,
                attach,
              })
              post('wanix:run:started', { id: msg.id, taskId: spawned })
            }
            break
          }
          case 'wanix:vm-run': {
            if (!root) {
              post('wanix:vm-run:done', {
                id: msg.id,
                code: 1,
                error: 'not ready',
              })
              break
            }
            if (!registry.vmbindsready) {
              post('wanix:vm-run:done', {
                id: msg.id,
                code: 1,
                error: 'vm assets not prepared',
              })
              break
            }
            const wait = msg.wait === true
            const vmid = typeof msg.vmId === 'string' ? msg.vmId : undefined
            const attach = msg.attach !== false
            const mem = typeof msg.mem === 'string' ? msg.mem : '512M'
            if (wait) {
              const result = await spawnvm(vmid, { wait: true, attach, mem })
              post('wanix:vm-run:done', {
                id: msg.id,
                vmId: result.vmId,
                code: result.code,
              })
            } else {
              const spawned = await spawnvm(vmid, {
                wait: false,
                attach,
                mem,
              })
              post('wanix:vm-run:started', { id: msg.id, vmId: spawned })
            }
            break
          }
          case 'wanix:term-write':
            handlettermwrite(msg)
            break
          default:
            break
        }
      } catch (err) {
        const message = err instanceof Error ? err.message : String(err)
        if (msg.type === 'wanix:run') {
          post('wanix:run:done', { id: msg.id, code: 1, error: message })
        } else if (msg.type === 'wanix:vm-run') {
          post('wanix:vm-run:done', { id: msg.id, code: 1, error: message })
        } else if (msg.type === 'wanix:put') {
          replyerror('wanix:put:done', msg, message)
        } else if (msg.type === 'wanix:mount-archive') {
          replyerror('wanix:mount-archive:done', msg, message)
        } else if (msg.type === 'wanix:unmount') {
          replyerror('wanix:unmount:done', msg, message)
        } else if (msg.type === 'wanix:unmount-all') {
          replyerror('wanix:unmount-all:done', msg, message)
        } else if (msg.type === 'wanix:ls') {
          replyerror('wanix:ls:done', msg, message)
        } else if (msg.type === 'wanix:halt') {
          replyerror('wanix:halt:done', msg, message)
        } else if (msg.type === 'wanix:vm-halt') {
          replyerror('wanix:vm-halt:done', msg, message)
        } else if (msg.type === 'wanix:vm-prep') {
          replyerror('wanix:vm-prep:done', msg, message)
        } else if (msg.type === 'wanix:attach') {
          replyerror('wanix:attach:done', msg, message)
        } else if (msg.type === 'wanix:term-write') {
          replyerror('wanix:term-write:done', msg, message)
        } else {
          post('wanix:log', { line: `wanix error: ${message}` })
        }
      }
    })

    boot().catch((err) => {
      const message = err instanceof Error ? err.message : String(err)
      post('wanix:log', { line: `wanix boot failed: ${message}` })
    })
  </script>
</body>
