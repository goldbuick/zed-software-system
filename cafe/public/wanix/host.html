<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>wanix host</title>
</head>
<body>
  <wanix-system wasm="/wanix/wanix.wasm">
    <wanix-bind dst="." src="#ramfs" data-wanix-boot="ramfs"></wanix-bind>
  </wanix-system>
  <script type="module" src="/wanix/wanix.min.js"></script>
  <script type="module">
    const origin = location.origin
    const DATA_WAIT_MS = 30_000
    const TASK_ID = 'run'
    const sys = document.querySelector('wanix-system')
    let root = null
    let active = false
    let bindseq = 0
    let termwriter = null
    let termreading = null
    let termflush = null

    const registry = {
      binds: [],
      task: null,
      termpath: null,
    }

    function post(type, data = {}) {
      parent.postMessage({ type, ...data }, origin)
    }

    function replydone(type, msg, extra = {}) {
      post(type, { id: msg.id, ...extra })
    }

    function replyerror(type, msg, error) {
      post(type, { id: msg.id, error })
    }

    function newbindid() {
      bindseq += 1
      return `bind-${bindseq}`
    }

    function bindmeta(entry) {
      return {
        id: entry.id,
        kind: entry.kind,
        dst: entry.dst,
        label: entry.label,
        removable: entry.removable,
      }
    }

    function listbindmeta() {
      return registry.binds.map(bindmeta)
    }

    function listremovablebindmeta() {
      return registry.binds.filter((entry) => entry.removable).map(bindmeta)
    }

    function readregistry() {
      return {
        binds: listbindmeta(),
        taskactive: registry.task?.rid != null,
        tid: registry.task?.rid ?? undefined,
        termpath: registry.termpath,
      }
    }

    function registerbootbind(el) {
      const id = newbindid()
      registry.binds.push({
        el,
        id,
        kind: 'boot',
        dst: '.',
        label: '#ramfs',
        removable: false,
      })
      el.dataset.wanixBindId = id
    }

    async function addbind(attrs) {
      const bindel = document.createElement('wanix-bind')
      for (const [key, value] of Object.entries(attrs)) {
        if (value != null && key !== 'label') {
          bindel.setAttribute(key, String(value))
        }
      }
      const id = newbindid()
      const entry = {
        el: bindel,
        id,
        kind: attrs.type || 'ns',
        dst: attrs.dst || '.',
        label: attrs.label || attrs.dst || id,
        removable: attrs.removable !== false,
      }
      bindel.dataset.wanixBindId = id
      sys.appendChild(bindel)
      registry.binds.push(entry)
      await new Promise((resolve) => setTimeout(resolve, 250))
      return id
    }

    function findbind(bindid) {
      return registry.binds.find((entry) => entry.id === bindid)
    }

    function removebind(bindid) {
      const idx = registry.binds.findIndex((entry) => entry.id === bindid)
      if (idx === -1) {
        throw new Error(`unknown bind: ${bindid}`)
      }
      const entry = registry.binds[idx]
      if (!entry.removable) {
        throw new Error(`bind not removable: ${bindid}`)
      }
      entry.el.remove()
      registry.binds.splice(idx, 1)
      return entry.id
    }

    function removeallbinds() {
      const removed = []
      for (const entry of [...registry.binds]) {
        if (!entry.removable) {
          continue
        }
        entry.el.remove()
        removed.push(entry.id)
        const idx = registry.binds.indexOf(entry)
        if (idx !== -1) {
          registry.binds.splice(idx, 1)
        }
      }
      return removed
    }

    function disconnectterm() {
      termflush = null
      termreading = null
      if (termwriter) {
        try {
          termwriter.releaseLock()
        } catch {
          // writer may already be closed
        }
        termwriter = null
      }
      registry.termpath = null
    }

    async function cleartask() {
      disconnectterm()
      if (registry.task) {
        registry.task.remove()
        registry.task = null
      }
    }

    async function gettermwriter() {
      if (!termwriter) {
        throw new Error('no active task term writer')
      }
      return termwriter
    }

    function createtask(cmd) {
      const task = document.createElement('wanix-task')
      task.setAttribute('id', TASK_ID)
      task.setAttribute('type', 'wasi')
      task.setAttribute('term', '')
      task.setAttribute('cmd', cmd)
      sys.appendChild(task)
      registry.task = task
      return task
    }

    function streamtermout(stream) {
      const reader = stream.getReader()
      const decoder = new TextDecoder()

      const reading = (async () => {
        try {
          while (true) {
            const { value, done } = await reader.read()
            if (done) {
              break
            }
            if (value && value.byteLength > 0) {
              post('wanix:term-out', { chunk: decoder.decode(value, { stream: true }) })
            }
          }
        } finally {
          reader.releaseLock()
        }
      })()

      return { reading }
    }

    async function connectterm(termpath) {
      const datapath = `${termpath}/data`
      await root.waitFor(datapath, DATA_WAIT_MS)
      const readable = await root.openReadable(datapath)
      const { reading } = streamtermout(readable)
      termreading = reading
      const writable = await root.openWritable(datapath)
      termwriter = writable.getWriter()
      registry.termpath = termpath
      return { reading }
    }

    async function runtask(cmd) {
      const taskcmd = (cmd || '').trim()
      if (!taskcmd) {
        throw new Error('empty command')
      }
      await cleartask()
      const task = createtask(taskcmd)
      await task.allocate()
      const taskpath = `#task/${task.rid}`
      const termpath = `#task/${TASK_ID}/term`
      const { reading } = await connectterm(termpath)
      await task.start()
      while (true) {
        try {
          const exit = (await root.readText(`${taskpath}/exit`)).trim()
          if (exit !== '') {
            await Promise.race([reading, new Promise((resolve) => setTimeout(resolve, 250))])
            await cleartask()
            return Number(exit) || 0
          }
        } catch {
          // task still running
        }
        await new Promise((resolve) => setTimeout(resolve, 50))
      }
    }

    async function halttask() {
      if (!registry.task?.rid) {
        await cleartask()
        return
      }
      const taskpath = `#task/${registry.task.rid}`
      try {
        await root.writeFile(`${taskpath}/ctl`, 'stop')
      } catch {
        // task may already be gone
      }
      await cleartask()
    }

    async function putfile(name, bytes) {
      await root.writeFile(name, bytes)
    }

    async function mountarchive(bytes, label) {
      const url = URL.createObjectURL(new Blob([bytes], { type: 'application/gzip' }))
      try {
        const bindid = await addbind({
          type: 'archive',
          dst: '.',
          src: url,
          label: label || 'archive.tgz',
        })
        return bindid
      } finally {
        URL.revokeObjectURL(url)
      }
    }

    async function listdir(path) {
      const entries = await root.readDir(path)
      return entries.map((name) => String(name))
    }

    async function boot() {
      const bootel = sys.querySelector('wanix-bind[data-wanix-boot]')
      if (bootel) {
        registerbootbind(bootel)
      }
      await new Promise((resolve) => {
        sys.addEventListener('ready', resolve, { once: true })
      })
      root = sys.root
      active = true
      post('wanix:ready')
      post('wanix:started')
    }

    window.addEventListener('message', async (ev) => {
      if (ev.origin !== origin) {
        return
      }
      const msg = ev.data
      if (!msg || typeof msg.type !== 'string') {
        return
      }
      try {
        switch (msg.type) {
          case 'wanix:status':
            replydone('wanix:status', msg, {
              active,
              ready: active && root != null,
              ...readregistry(),
            })
            break
          case 'wanix:list-binds':
            replydone('wanix:list-binds', msg, {
              binds: listremovablebindmeta(),
            })
            break
          case 'wanix:put': {
            if (!root) {
              replyerror('wanix:put:done', msg, 'not ready')
              break
            }
            const raw = msg.bytes
            const bytes =
              raw instanceof ArrayBuffer
                ? new Uint8Array(raw)
                : new Uint8Array(raw)
            await putfile(msg.name, bytes)
            replydone('wanix:put:done', msg)
            break
          }
          case 'wanix:mount-archive': {
            if (!root) {
              replyerror('wanix:mount-archive:done', msg, 'not ready')
              break
            }
            const raw = msg.bytes
            const bytes =
              raw instanceof ArrayBuffer
                ? new Uint8Array(raw)
                : new Uint8Array(raw)
            const label = typeof msg.name === 'string' ? msg.name : 'archive.tgz'
            const bindid = await mountarchive(bytes, label)
            replydone('wanix:mount-archive:done', msg, { bindId: bindid })
            break
          }
          case 'wanix:unmount': {
            if (!root) {
              replyerror('wanix:unmount:done', msg, 'not ready')
              break
            }
            const bindid = typeof msg.bindId === 'string' ? msg.bindId : ''
            if (!bindid) {
              replyerror('wanix:unmount:done', msg, 'missing bindId')
              break
            }
            removebind(bindid)
            replydone('wanix:unmount:done', msg, { bindId: bindid })
            break
          }
          case 'wanix:unmount-all': {
            if (!root) {
              replyerror('wanix:unmount-all:done', msg, 'not ready')
              break
            }
            const removed = removeallbinds()
            replydone('wanix:unmount-all:done', msg, { removed })
            break
          }
          case 'wanix:ls': {
            if (!root) {
              replyerror('wanix:ls:done', msg, 'not ready')
              break
            }
            const entries = await listdir(msg.path || '.')
            replydone('wanix:ls:done', msg, { entries })
            break
          }
          case 'wanix:halt': {
            if (!root) {
              replyerror('wanix:halt:done', msg, 'not ready')
              break
            }
            await halttask()
            replydone('wanix:halt:done', msg)
            break
          }
          case 'wanix:run': {
            if (!root) {
              post('wanix:run:done', { id: msg.id, code: 1, error: 'not ready' })
              break
            }
            const code = await runtask(msg.cmd)
            post('wanix:run:done', { id: msg.id, code })
            break
          }
          case 'wanix:term-write': {
            if (!root || !registry.task?.rid) {
              replyerror('wanix:term-write:done', msg, 'no active task')
              break
            }
            const writer = await gettermwriter()
            const line = typeof msg.data === 'string' ? msg.data : ''
            await writer.write(new TextEncoder().encode(`${line}\n`))
            replydone('wanix:term-write:done', msg)
            break
          }
          default:
            break
        }
      } catch (err) {
        const message = err instanceof Error ? err.message : String(err)
        if (msg.type === 'wanix:run') {
          post('wanix:run:done', { id: msg.id, code: 1, error: message })
        } else if (msg.type === 'wanix:put') {
          replyerror('wanix:put:done', msg, message)
        } else if (msg.type === 'wanix:mount-archive') {
          replyerror('wanix:mount-archive:done', msg, message)
        } else if (msg.type === 'wanix:unmount') {
          replyerror('wanix:unmount:done', msg, message)
        } else if (msg.type === 'wanix:unmount-all') {
          replyerror('wanix:unmount-all:done', msg, message)
        } else if (msg.type === 'wanix:ls') {
          replyerror('wanix:ls:done', msg, message)
        } else if (msg.type === 'wanix:halt') {
          replyerror('wanix:halt:done', msg, message)
        } else if (msg.type === 'wanix:term-write') {
          replyerror('wanix:term-write:done', msg, message)
        } else {
          post('wanix:log', { line: `wanix error: ${message}` })
        }
      }
    })

    boot().catch((err) => {
      const message = err instanceof Error ? err.message : String(err)
      post('wanix:log', { line: `wanix boot failed: ${message}` })
    })
  </script>
</body>
</html>
