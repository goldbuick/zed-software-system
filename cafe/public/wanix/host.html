<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>wanix host</title>
</head>
<body>
  <wanix-system wasm="/wanix/wanix.wasm">
    <wanix-bind dst="." src="#ramfs"></wanix-bind>
  </wanix-system>
  <script type="module" src="/wanix/wanix.min.js"></script>
  <script type="module">
    const origin = location.origin
    const OUTPUT_TIMEOUT_MS = 30_000
    const sys = document.querySelector('wanix-system')
    let root = null
    let active = false
    let currenttid = null

    function post(type, data = {}) {
      parent.postMessage({ type, ...data }, origin)
    }

    function replydone(type, msg, extra = {}) {
      post(type, { id: msg.id, ...extra })
    }

    function replyerror(type, msg, error) {
      post(type, { id: msg.id, error })
    }

    async function pipestdout(stream, online) {
      const reader = stream.getReader()
      const decoder = new TextDecoder()
      let pending = ''
      try {
        while (true) {
          const { value, done } = await reader.read()
          if (done) {
            break
          }
          pending += decoder.decode(value, { stream: true })
          let idx = pending.indexOf('\n')
          while (idx !== -1) {
            const line = pending.slice(0, idx)
            pending = pending.slice(idx + 1)
            if (line.length > 0) {
              online(line)
            }
            idx = pending.indexOf('\n')
          }
        }
        const tail = pending.trimEnd()
        if (tail.length > 0) {
          online(tail)
        }
      } finally {
        reader.releaseLock()
      }
    }

    async function wiretaskstdio(tid) {
      const taskpath = `#task/${tid}`
      const taskroot = sys.openHandle(tid)
      const termid = (await root.readText('#term/new')).trim()
      const term = `#term/${termid}`
      await root.bind(term, `${taskpath}/term`)
      await taskroot.bind(term, '#task/self/term')
      const program = `${term}/program`
      await taskroot.bind(program, `${taskpath}/fd/0`)
      await taskroot.bind(program, `${taskpath}/fd/1`)
      await taskroot.bind(program, `${taskpath}/fd/2`)
      return term
    }

    async function runtask(cmd) {
      const taskcmd = (cmd || '').trim()
      if (!taskcmd) {
        throw new Error('empty command')
      }
      const tid = (await root.readText('#task/new/wasi')).trim()
      currenttid = tid
      const taskpath = `#task/${tid}`
      await root.writeFile(`${taskpath}/cmd`, taskcmd)
      const term = await wiretaskstdio(tid)
      const logline = (line) => post('wanix:log', { line: line.replace(/\r$/, '') })
      const datapath = `${term}/data`
      await root.waitFor(datapath, OUTPUT_TIMEOUT_MS)
      const stdout = await root.openReadable(datapath)
      const reading = pipestdout(stdout, logline)
      await root.writeFile(`${taskpath}/ctl`, 'start')
      const deadline = Date.now() + OUTPUT_TIMEOUT_MS
      while (Date.now() < deadline) {
        try {
          const exit = (await root.readText(`${taskpath}/exit`)).trim()
          if (exit !== '') {
            await Promise.race([reading, new Promise((resolve) => setTimeout(resolve, 250))])
            currenttid = null
            return Number(exit) || 0
          }
        } catch {
          // task still running
        }
        await new Promise((resolve) => setTimeout(resolve, 50))
      }
      currenttid = null
      throw new Error('task output timeout')
    }

    async function halttask() {
      if (!currenttid) {
        return
      }
      const taskpath = `#task/${currenttid}`
      try {
        await root.writeFile(`${taskpath}/ctl`, 'stop')
      } catch {
        // task may already be gone
      }
      currenttid = null
    }

    async function putfile(name, bytes) {
      await root.writeFile(name, bytes)
    }

    async function mountarchive(bytes) {
      const url = URL.createObjectURL(new Blob([bytes], { type: 'application/gzip' }))
      try {
        const bindel = document.createElement('wanix-bind')
        bindel.setAttribute('type', 'archive')
        bindel.setAttribute('dst', '.')
        bindel.setAttribute('src', url)
        sys.appendChild(bindel)
        await new Promise((resolve) => setTimeout(resolve, 250))
      } finally {
        URL.revokeObjectURL(url)
      }
    }

    async function listdir(path) {
      const entries = await root.readDir(path)
      return entries.map((name) => String(name))
    }

    async function boot() {
      await new Promise((resolve) => {
        sys.addEventListener('ready', resolve, { once: true })
      })
      root = sys.root
      active = true
      post('wanix:ready')
      post('wanix:started')
    }

    window.addEventListener('message', async (ev) => {
      if (ev.origin !== origin) {
        return
      }
      const msg = ev.data
      if (!msg || typeof msg.type !== 'string') {
        return
      }
      try {
        switch (msg.type) {
          case 'wanix:status':
            replydone('wanix:status', msg, {
              active,
              ready: active && root != null,
              taskactive: currenttid != null,
              tid: currenttid ?? undefined,
            })
            break
          case 'wanix:put': {
            if (!root) {
              replyerror('wanix:put:done', msg, 'not ready')
              break
            }
            const raw = msg.bytes
            const bytes =
              raw instanceof ArrayBuffer
                ? new Uint8Array(raw)
                : new Uint8Array(raw)
            await putfile(msg.name, bytes)
            replydone('wanix:put:done', msg)
            break
          }
          case 'wanix:mount-archive': {
            if (!root) {
              replyerror('wanix:mount-archive:done', msg, 'not ready')
              break
            }
            const raw = msg.bytes
            const bytes =
              raw instanceof ArrayBuffer
                ? new Uint8Array(raw)
                : new Uint8Array(raw)
            await mountarchive(bytes)
            replydone('wanix:mount-archive:done', msg)
            break
          }
          case 'wanix:ls': {
            if (!root) {
              replyerror('wanix:ls:done', msg, 'not ready')
              break
            }
            const entries = await listdir(msg.path || '.')
            replydone('wanix:ls:done', msg, { entries })
            break
          }
          case 'wanix:halt': {
            if (!root) {
              replyerror('wanix:halt:done', msg, 'not ready')
              break
            }
            await halttask()
            replydone('wanix:halt:done', msg)
            break
          }
          case 'wanix:run': {
            if (!root) {
              post('wanix:run:done', { id: msg.id, code: 1, error: 'not ready' })
              break
            }
            const code = await runtask(msg.cmd)
            post('wanix:run:done', { id: msg.id, code })
            break
          }
          default:
            break
        }
      } catch (err) {
        const message = err instanceof Error ? err.message : String(err)
        if (msg.type === 'wanix:run') {
          post('wanix:run:done', { id: msg.id, code: 1, error: message })
        } else if (msg.type === 'wanix:put') {
          replyerror('wanix:put:done', msg, message)
        } else if (msg.type === 'wanix:mount-archive') {
          replyerror('wanix:mount-archive:done', msg, message)
        } else if (msg.type === 'wanix:ls') {
          replyerror('wanix:ls:done', msg, message)
        } else if (msg.type === 'wanix:halt') {
          replyerror('wanix:halt:done', msg, message)
        } else {
          post('wanix:log', { line: `wanix error: ${message}` })
        }
      }
    })

    boot().catch((err) => {
      const message = err instanceof Error ? err.message : String(err)
      post('wanix:log', { line: `wanix boot failed: ${message}` })
    })
  </script>
</body>
</html>
