<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>wanix basic-vm term iframe smoke (WebGL parent)</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #120a18;
      }
      #frame {
        display: block;
        width: 100%;
        height: 100%;
      }
      #wanix-child {
        position: fixed;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
        border: 0;
      }
      #status {
        position: fixed;
        left: 8px;
        bottom: 8px;
        color: #8f8;
        font: 12px ui-monospace, monospace;
        background: rgba(0, 0, 0, 0.6);
        padding: 6px 8px;
        max-width: 40vw;
      }
    </style>
  </head>
  <body>
    <canvas id="frame"></canvas>
    <iframe
      id="wanix-child"
      title="wanix vm term child"
      src="/wanix/vm-simple.html?embed=1&probe=1"
    ></iframe>
    <pre id="status"></pre>
    <script type="module" src="/wanix-term-iframe-smoke-boot.tsx"></script>
  </body>
</html>
