name = "net-zns"
main = "net-zns-worker.js"
compatibility_date = "2026-06-10"

# KV binding used as env.zns in net-zns-worker.js
# List existing: yarn wrangler kv namespace list
# Create new:    yarn wrangler kv namespace create zns
[[kv_namespaces]]
binding = "zns"
id = "ZNS"

[vars]
ZNS_APEX = "zns.zed.cafe"
BYTES_ORIGIN = "https://bytes.zed.cafe"
JOIN_ORIGIN = "https://zed.cafe"

[[routes]]
pattern = "zns.zed.cafe/*"
zone_name = "zed.cafe"

[[routes]]
pattern = "*.zns.zed.cafe/*"
zone_name = "zed.cafe"
