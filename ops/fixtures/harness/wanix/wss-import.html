<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>wanix wss-import harness</title>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/wanix@0.4.0-alpha8/dist/wanix.min.js"
    ></script>
    <style>
      body {
        font: 14px ui-monospace, Menlo, Monaco, Consolas, monospace;
        margin: 16px;
      }
      #status {
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>wanix wss-import harness</h1>
    <p>
      Start <code>wanix serve /tmp/wanix-remote-test</code> with
      <code>hello.txt</code> in that dir. Dev app proxy:
      <code>wss://&lt;host&gt;/wanix-remote-9p</code>
    </p>
    <pre id="status">booting…</pre>
    <wanix-system
      id="wss-import"
      wasm="https://cdn.jsdelivr.net/npm/wanix@0.4.0-alpha8/dist/wanix.debug.wasm"
      allow-origins="*"
      debug
    >
      <wanix-bind dst="." src="#ramfs"></wanix-bind>
    </wanix-system>
    <script type="module">
      const params = new URLSearchParams(window.location.search)
      const importsrc =
        params.get('src') ||
        `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}/wanix-remote-9p`

      const statusel = document.getElementById('status')

      function setstatus(text) {
        if (statusel) {
          statusel.textContent = text
        }
      }

      function log(line) {
        setstatus((statusel?.textContent ?? '') + line + '\n')
        console.log('[wss-import]', line)
      }

      window.addEventListener('error', (e) => log('window.error: ' + e.message))
      window.addEventListener('unhandledrejection', (e) =>
        log('unhandledrejection: ' + e.reason),
      )

      const sys = document.querySelector('wanix-system')
      const bind = document.createElement('wanix-bind')
      bind.setAttribute('type', 'import')
      bind.setAttribute('dst', 'remote')
      bind.setAttribute('src', importsrc)
      bind.addEventListener('mount', () => log('import bind mounted'))
      bind.addEventListener('error', () => log('import bind error'))
      sys.appendChild(bind)

      sys.addEventListener('ready', async () => {
        log('wanix-system ready')
        log(`import src: ${importsrc}`)
        try {
          const entries = await sys.root.readDir('remote')
          log(`readDir(remote): ${entries.join(', ') || '(empty)'}`)
          const hashello = entries.some(
            (entry) => entry.replace(/\/$/, '') === 'hello.txt',
          )
          if (hashello) {
            const bytes = await sys.root.readFile('remote/hello.txt')
            const text =
              bytes instanceof Uint8Array
                ? new TextDecoder().decode(bytes)
                : String(bytes)
            log(`remote/hello.txt: ${text.trim()}`)
          }
          setstatus(
            (statusel?.textContent ?? '') +
              (hashello ? '\nOK: remote import readable' : '\nWARN: hello.txt missing on serve dir'),
          )
        } catch (err) {
          log('readDir(remote) failed: ' + (err?.message ?? err))
        }
      })
      sys.addEventListener('error', (e) => {
        log('wanix-system error: ' + (e.detail?.error ?? e))
      })
    </script>
  </body>
</html>
