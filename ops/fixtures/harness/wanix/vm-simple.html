<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>wanix vm-simple (upstream basic-vm.html)</title>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/wanix@0.4.0-alpha8/dist/wanix.min.js"
    ></script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      wanix-system {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
      }
      wanix-term {
        flex: 1;
        min-height: 0;
      }
      body.embed wanix-system {
        position: fixed;
        left: -9999px;
        top: 0;
        width: max-content;
        height: max-content;
        opacity: 0;
        pointer-events: none;
        overflow: hidden;
      }
      body.embed wanix-term {
        display: block;
        width: 640px;
        height: 480px;
        min-width: 640px;
        min-height: 480px;
      }
      #log {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        max-height: 22vh;
        margin: 0;
        padding: 8px;
        background: rgba(0, 0, 0, 0.75);
        color: #0f0;
        font: 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        overflow: auto;
        pointer-events: none;
      }
      body.embed #log {
        display: none;
      }
    </style>
  </head>
  <body style="height: 100vh; margin: 0">
    <!-- Upstream tractordev/wanix examples/basic-vm.html (0.4 recipe) -->
    <wanix-system
      id="linux"
      wasm="https://cdn.jsdelivr.net/npm/wanix@0.4.0-alpha8/dist/wanix.debug.wasm"
      allow-origins="*"
      debug
    >
      <wanix-bind
        dst="."
        src="https://cdn.jsdelivr.net/npm/wanix-extras@0.4.0-rc1/dist/wanix-linux.tgz"
        type="archive"
      ></wanix-bind>
      <wanix-bind dst="vm" src="#vm"></wanix-bind>
      <wanix-bind
        dst="#vm/v86"
        src="https://cdn.jsdelivr.net/npm/wanix-extras@0.4.0-rc1/dist/v86.tgz"
        type="archive"
      ></wanix-bind>
      <wanix-vm export="ttyS0" term start></wanix-vm>
      <wanix-term path="#vm/1/term" raw></wanix-term>
    </wanix-system>
    <pre id="log"></pre>
    <script type="module">
      const params = new URLSearchParams(window.location.search)
      const embed = params.get('embed') === '1'
      if (embed) {
        document.body.classList.add('embed')
      }

      const logel = document.getElementById('log')
      function log(line) {
        if (!logel) {
          return
        }
        logel.textContent += line + '\n'
        console.log('[vm-simple]', line)
      }

      window.addEventListener('error', (e) => log('window.error: ' + e.message))
      window.addEventListener('unhandledrejection', (e) =>
        log('unhandledrejection: ' + e.reason),
      )

      const sys = document.querySelector('wanix-system')
      sys.addEventListener('ready', () => log('wanix-system ready'))
      sys.addEventListener('error', (e) => {
        log('wanix-system error: ' + (e.detail?.error ?? e))
      })

      if (embed) {
        const postvmready = () => {
          const target =
            window.parent !== window ? window.parent : null
          target?.postMessage(
            { type: 'zss-wanix-vm-ready' },
            window.location.origin,
          )
        }
        sys?.addEventListener('ready', postvmready, { once: true })
        import('/wanix-vm-embed.ts')
      }
    </script>
  </body>
</html>
