<html>
  <head>
    <title>basic-vm</title>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/wanix@0.4.0-alpha8/dist/wanix.min.js"
    ></script>
  </head>
  <body style="height: 100vh; margin: 0">
    <!-- a wanix system is an empty root task/namespace -->
    <wanix-system
      id="linux"
      wasm="https://cdn.jsdelivr.net/npm/wanix@0.4.0-alpha8/dist/wanix.debug.wasm"
      allow-origins="*"
      debug
    >
      <!-- bind a (slightly custom) alpine linux root to our root -->
      <wanix-bind
        dst="."
        src="https://cdn.jsdelivr.net/npm/wanix-extras@0.4.0-rc1/dist/wanix-linux.tgz"
        type="archive"
      ></wanix-bind>

      <!-- this exports the vm system namespace -->
      <wanix-bind dst="vm" src="#vm"></wanix-bind>

      <!-- add the v86 vm driver to the namespace -->
      <wanix-bind
        dst="#vm/v86"
        src="https://cdn.jsdelivr.net/npm/wanix-extras@0.4.0-rc1/dist/v86.tgz"
        type="archive"
      ></wanix-bind>

      <!-- declare and start a vm with this namespace as root and use ttyS0 for hostexport -->
      <!-- wip: many vm attributes are hardcoded in dev atm -->
      <wanix-vm export="ttyS0" term start></wanix-vm>

      <!-- terminal attached to vm terminal -->
      <wanix-term path="#vm/1/term" raw></wanix-term>
    </wanix-system>
  </body>
</html>
