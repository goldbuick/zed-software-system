<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>zed-cafe WASI task read harness</title>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/wanix@0.4.0-alpha8/dist/wanix.min.js"
    ></script>
    <style>
      body {
        font: 14px ui-monospace, Menlo, Monaco, Consolas, monospace;
        margin: 16px;
      }
      #status {
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>zed-cafe task read harness</h1>
    <pre id="status">booting…</pre>
    <wanix-system
      id="zed-cafe-task-read"
      wasm="https://cdn.jsdelivr.net/npm/wanix@0.4.0-alpha8/dist/wanix.debug.wasm"
      allow-origins="*"
      debug
    >
      <wanix-bind dst="." src="#ramfs"></wanix-bind>
      <wanix-bind
        type="file"
        dst="zedcaferead.wasm"
        src="/ops/fixtures/wanix/zedcaferead.wasm"
      ></wanix-bind>
      <wanix-bind
        type="file"
        dst="zed-cafe/manifest.json"
        src="/ops/fixtures/wanix/zed-cafe-harness-manifest.json"
      ></wanix-bind>
    </wanix-system>
    <script type="module">
      const WASM_URL = '/ops/fixtures/wanix/zedcaferead.wasm'
      const MANIFEST_PATH = 'zed-cafe/manifest.json'
      const TASK_ID = 'read-manifest'
      const statusel = document.getElementById('status')

      function setstatus(text) {
        if (statusel) {
          statusel.textContent = text
        }
      }

      async function probemanifest(root) {
        try {
          const probe = await root.readFile(MANIFEST_PATH)
          return probe instanceof Uint8Array
            ? `${probe.length} bytes`
            : 'present'
        } catch (err) {
          return String(err)
        }
      }

      function readtermtext() {
        const term = document.querySelector('wanix-term')?._term
        if (!term) {
          return ''
        }
        const active = term.buffer.active
        const lines = []
        for (let i = 0; i < active.length; i++) {
          lines.push(active.getLine(i)?.translateToString(true) ?? '')
        }
        return lines.join('\n').trim()
      }

      async function waitformarker(root, timeoutms = 20000) {
        const deadline = Date.now() + timeoutms
        while (Date.now() < deadline) {
          try {
            const listing = await root.readDir('.')
            if (
              Array.isArray(listing) &&
              listing.some(
                (entry) => entry.replace(/\/$/, '') === 'zed-cafe-read.ok',
              )
            ) {
              return {
                ok: true,
                marker: 'present',
                text: readtermtext(),
              }
            }
          } catch {
            // keep polling
          }
          await new Promise((r) => setTimeout(r, 100))
        }
        return { ok: false, error: 'marker timeout', text: readtermtext() }
      }

      async function run() {
        const sys = document.querySelector('wanix-system')
        const root = await new Promise((resolve, reject) => {
          const timer = setTimeout(
            () => reject(new Error('wanix-system ready timeout')),
            120000,
          )
          sys.addEventListener(
            'ready',
            () => {
              clearTimeout(timer)
              resolve(sys.root)
            },
            { once: true },
          )
          sys.addEventListener(
            'error',
            (e) => {
              clearTimeout(timer)
              reject(e.detail?.error ?? new Error('wanix-system error'))
            },
            { once: true },
          )
        })

        const manifestprobe = await probemanifest(root)

        const task = document.createElement('wanix-task')
        task.id = TASK_ID
        task.setAttribute('type', 'wasi')
        task.setAttribute('cmd', 'zedcaferead.wasm')
        task.setAttribute('term', '')
        sys.appendChild(task)

        await task.allocate?.()
        const rid = task.rid
        if (!rid) {
          throw new Error('task allocate: missing rid')
        }

        const term = document.createElement('wanix-term')
        term.setAttribute('path', `#task/${rid}/term`)
        sys.appendChild(term)

        const exitwait = waitformarker(root)
        await task.start?.()
        const result = await exitwait
        const evidence = {
          pass: result.ok && /bytes$/.test(manifestprobe),
          taskrid: rid,
          manifest_probe: manifestprobe,
          marker: result.marker ?? null,
          output: result.text ?? '',
          error: result.error ?? null,
        }
        window.zedcafeTaskReadResult = evidence
        setstatus(JSON.stringify(evidence, null, 2))
        if (!evidence.pass) {
          throw new Error(
            `zed-cafe task read failed: ${evidence.output || evidence.error || 'no output'}`,
          )
        }
      }

      run().catch((err) => {
        const prior = window.zedcafeTaskReadResult
        const evidence = {
          pass: false,
          error: err instanceof Error ? err.message : String(err),
          wasm: WASM_URL,
          ...(prior && typeof prior === 'object' ? prior : {}),
        }
        window.zedcafeTaskReadResult = evidence
        setstatus(JSON.stringify(evidence, null, 2))
      })
    </script>
  </body>
</html>
