<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>zed-cafe gojs export harness</title>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/wanix@0.4.0-alpha8/dist/wanix.min.js"
    ></script>
    <style>
      body {
        font: 14px ui-monospace, Menlo, Monaco, Consolas, monospace;
        margin: 16px;
      }
      #status {
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>zed-cafe export harness</h1>
    <pre id="status">booting…</pre>
    <wanix-system
      id="zed-cafe-harness"
      wasm="https://cdn.jsdelivr.net/npm/wanix@0.4.0-alpha8/dist/wanix.debug.wasm"
      allow-origins="*"
      debug
    >
      <wanix-bind dst="." src="#ramfs"></wanix-bind>
      <wanix-bind
        type="file"
        dst="#ramfs/zed-cafe.wasm"
        src="/wanix/zed-cafe.wasm"
      ></wanix-bind>
    </wanix-system>
    <script type="module">
      const WASM_CMD = '#ramfs/zed-cafe.wasm'
      const INBOX_RAMFS = '#ramfs/zed-cafe-inbox.json'
      const TASK_ID = 'zed-cafe'
      const statusel = document.getElementById('status')

      function setstatus(text) {
        if (statusel) {
          statusel.textContent = text
        }
      }

      function sampleinboxbytes() {
        const payload = {
          files: [
            {
              path: 'manifest.json',
              data: btoa(
                JSON.stringify({
                  exportedAt: new Date().toISOString(),
                  bookCount: 0,
                  books: [],
                }),
              ),
            },
          ],
        }
        return new TextEncoder().encode(`${JSON.stringify(payload)}\n`)
      }

      function waitwanixbindmount(bind, timeoutms = 10000) {
        return new Promise((resolve, reject) => {
          let settled = false
          const finish = (ok, err) => {
            if (settled) {
              return
            }
            settled = true
            clearTimeout(timer)
            if (ok) {
              resolve()
              return
            }
            reject(err ?? new Error('bind mount failed'))
          }
          const timer = setTimeout(() => {
            finish(false, new Error('bind mount timeout'))
          }, timeoutms)
          bind.addEventListener('mount', () => finish(true), { once: true })
          bind.addEventListener(
            'error',
            () => finish(false, new Error('bind mount error')),
            { once: true },
          )
          queueMicrotask(() => {
            if (bind.isConnected && bind.hasAttribute('rid')) {
              finish(true)
            }
          })
        })
      }

      async function probestate(root, rid) {
        const probe = {
          taskrid: rid,
          wasm_cmd: WASM_CMD,
          inbox_ramfs_bytes: 'missing',
          inbox_task_bytes: 'missing',
          export_listing: null,
          export_error: null,
        }
        try {
          const ramfs = await root.readFile(INBOX_RAMFS)
          probe.inbox_ramfs_bytes =
            ramfs instanceof Uint8Array ? ramfs.length : String(ramfs).length
        } catch (err) {
          probe.inbox_ramfs_bytes = String(err)
        }
        if (rid) {
          try {
            const taskinbox = await root.readFile(INBOX_RAMFS)
            probe.inbox_task_bytes =
              taskinbox instanceof Uint8Array
                ? taskinbox.length
                : String(taskinbox).length
          } catch (err) {
            probe.inbox_task_bytes = String(err)
          }
          try {
            probe.export_listing = await root.readDir(`#task/${rid}/export`)
          } catch (err) {
            probe.export_error = String(err)
          }
        }
        return probe
      }

      async function waitforexport(root, rid, timeoutms = 30000) {
        const deadline = Date.now() + timeoutms
        while (Date.now() < deadline) {
          const probe = await probestate(root, rid)
          if (
            Array.isArray(probe.export_listing) &&
            probe.export_listing.some(
              (entry) => entry.replace(/\/$/, '') === 'manifest.json',
            )
          ) {
            return { ok: true, probe }
          }
          await new Promise((r) => setTimeout(r, 250))
        }
        return { ok: false, probe: await probestate(root, rid) }
      }

      async function run() {
        const sys = document.querySelector('wanix-system')
        const root = await new Promise((resolve, reject) => {
          const timer = setTimeout(
            () => reject(new Error('wanix-system ready timeout')),
            120000,
          )
          sys.addEventListener(
            'ready',
            () => {
              clearTimeout(timer)
              resolve(sys.root)
            },
            { once: true },
          )
          sys.addEventListener(
            'error',
            (e) => {
              clearTimeout(timer)
              reject(e.detail?.error ?? new Error('wanix-system error'))
            },
            { once: true },
          )
        })

        const inboxbytes = sampleinboxbytes()
        await root.writeFile(INBOX_RAMFS, inboxbytes)

        const existing = sys.querySelector(`wanix-task[id="${TASK_ID}"]`)
        if (existing) {
          existing.remove()
        }

        const task = document.createElement('wanix-task')
        task.id = TASK_ID
        task.setAttribute('type', 'gojs')
        task.setAttribute('cmd', WASM_CMD)
        sys.appendChild(task)

        await task.allocate?.()
        const rid = task.rid
        if (!rid) {
          throw new Error('zed-cafe task allocate: missing rid')
        }

        const inboxcheck = await root.readFile(INBOX_RAMFS)
        if (
          !(inboxcheck instanceof Uint8Array) ||
          inboxcheck.length === 0
        ) {
          throw new Error('zed-cafe inbox missing on #ramfs before start')
        }

        await task.start?.()

        const result = await waitforexport(root, rid)
        const evidence = {
          pass: result.ok,
          probe: result.probe,
        }
        window.zedcafeExportResult = evidence
        setstatus(JSON.stringify(evidence, null, 2))
        if (!result.ok) {
          throw new Error('export manifest.json missing')
        }
      }

      run().catch((err) => {
        const evidence = {
          pass: false,
          error: err instanceof Error ? err.message : String(err),
        }
        window.zedcafeExportResult = evidence
        setstatus(JSON.stringify(evidence, null, 2))
      })
    </script>
  </body>
</html>
