<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>zed-cafe duplex write harness</title>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/wanix@0.4.0-alpha8/dist/wanix.min.js"
    ></script>
    <style>
      body {
        font: 14px ui-monospace, Menlo, Monaco, Consolas, monospace;
        margin: 16px;
      }
      #status {
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>zed-cafe duplex write harness</h1>
    <pre id="status">booting…</pre>
    <wanix-system
      id="zed-cafe-duplex"
      wasm="https://cdn.jsdelivr.net/npm/wanix@0.4.0-alpha8/dist/wanix.debug.wasm"
      allow-origins="*"
      debug
    >
      <wanix-bind dst="." src="#ramfs"></wanix-bind>
      <wanix-bind
        type="file"
        dst="zedcafewrite.wasm"
        src="/ops/fixtures/wanix/zedcafewrite.wasm"
      ></wanix-bind>
      <wanix-bind dst="zed-cafe" src="#ramfs/zed-cafe-export"></wanix-bind>
    </wanix-system>
    <script type="module">
      const WASM_URL = '/ops/fixtures/wanix/zedcafewrite.wasm'
      const TASK_ID = 'write-stats'
      const statusel = document.getElementById('status')

      function setstatus(text) {
        if (statusel) {
          statusel.textContent = text
        }
      }

      function readtermtext() {
        const term = document.querySelector('wanix-term')?._term
        if (!term) {
          return ''
        }
        const active = term.buffer.active
        const lines = []
        for (let i = 0; i < active.length; i++) {
          lines.push(active.getLine(i)?.translateToString(true) ?? '')
        }
        return lines.join('\n').trim()
      }

      async function waitforguesttouch(root, timeoutms = 20000) {
        const deadline = Date.now() + timeoutms
        while (Date.now() < deadline) {
          try {
            const raw = await root.readFile('zed-cafe/stats.json')
            const text =
              raw instanceof Uint8Array
                ? new TextDecoder().decode(raw)
                : String(raw)
            if (text.includes('"guestTouch":true')) {
              return { ok: true, text }
            }
          } catch {
            // keep polling
          }
          await new Promise((r) => setTimeout(r, 150))
        }
        return { ok: false, error: 'guestTouch timeout', text: readtermtext() }
      }

      async function run() {
        const sys = document.querySelector('wanix-system')
        const root = await new Promise((resolve, reject) => {
          const timer = setTimeout(
            () => reject(new Error('wanix-system ready timeout')),
            120000,
          )
          sys.addEventListener(
            'ready',
            () => {
              clearTimeout(timer)
              resolve(sys.root)
            },
            { once: true },
          )
          sys.addEventListener(
            'error',
            (e) => {
              clearTimeout(timer)
              reject(e.detail?.error ?? new Error('wanix-system error'))
            },
            { once: true },
          )
        })

        const seed = new TextEncoder().encode(
          '{"exportedAt":"host","bookCount":0,"books":[]}\n',
        )
        await root.writeFile('#ramfs/zed-cafe-export/stats.json', seed)

        const task = document.createElement('wanix-task')
        task.id = TASK_ID
        task.setAttribute('type', 'wasi')
        task.setAttribute('cmd', 'zedcafewrite.wasm')
        task.setAttribute('term', '')
        sys.appendChild(task)

        await task.allocate?.()
        const rid = task.rid
        if (!rid) {
          throw new Error('task allocate: missing rid')
        }

        const term = document.createElement('wanix-term')
        term.setAttribute('path', `#task/${rid}/term`)
        sys.appendChild(term)

        const poll = waitforguesttouch(root)
        await task.start?.()
        const guest = await poll
        const output = readtermtext()
        const evidence = {
          pass:
            guest.ok &&
            /zed-cafe write ok/.test(output),
          taskrid: rid,
          guest_tree: guest.text ?? null,
          output,
          error: guest.error ?? null,
        }
        window.zedcafeDuplexResult = evidence
        setstatus(JSON.stringify(evidence, null, 2))
        if (!evidence.pass) {
          throw new Error(
            `zed-cafe duplex failed: ${evidence.output || evidence.error || 'no output'}`,
          )
        }
      }

      run().catch((err) => {
        const prior = window.zedcafeDuplexResult
        const evidence = {
          pass: false,
          error: err instanceof Error ? err.message : String(err),
          wasm: WASM_URL,
          ...(prior && typeof prior === 'object' ? prior : {}),
        }
        window.zedcafeDuplexResult = evidence
        setstatus(JSON.stringify(evidence, null, 2))
      })
    </script>
  </body>
</html>
